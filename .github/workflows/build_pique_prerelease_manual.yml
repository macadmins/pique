name: Build Pique pre-release (Manual)

env:
  NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD_MAOS }}
  PIQUE_PROFILE_NAME: ${{ secrets.PIQUE_PROVISION_PROFILE_NAME_MAOS }}
  PIQUE_PREVIEW_PROFILE_NAME: ${{ secrets.PIQUE_PREVIEW_PROVISION_PROFILE_NAME_MAOS }}

on: [workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
    - name: Checkout pique repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Select Xcode 26.3
      run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

    - name: Install Apple Xcode certificates
      uses: apple-actions/import-codesign-certs@v6
      with:
        keychain-password: ${{ github.run_id }}
        p12-file-base64: ${{ secrets.APP_CERTIFICATES_P12_MAOS }}
        p12-password: ${{ secrets.APP_CERTIFICATES_P12_PASSWORD_MAOS }}

    - name: Install Apple Installer certificates
      uses: apple-actions/import-codesign-certs@v6
      with:
        create-keychain: false # do not create a new keychain for this value
        keychain-password: ${{ github.run_id }}
        p12-file-base64: ${{ secrets.PKG_CERTIFICATES_P12_MAOS }}
        p12-password: ${{ secrets.PKG_CERTIFICATES_P12_PASSWORD_MAOS }}

    - name: Install provisioning profiles
      env:
        PIQUE_PROFILE_B64: ${{ secrets.PIQUE_PROVISION_PROFILE_BASE64_MAOS }}
        PREVIEW_PROFILE_B64: ${{ secrets.PIQUE_PREVIEW_PROVISION_PROFILE_BASE64_MAOS }}
      run: |
        PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
        mkdir -p "$PROFILE_DIR"
        for pair in "pique:$PIQUE_PROFILE_B64" "preview:$PREVIEW_PROFILE_B64"; do
          name="${pair%%:*}"
          b64="${pair#*:}"
          tmp="$(mktemp).provisionprofile"
          printf '%s' "$b64" | base64 --decode > "$tmp"
          uuid=$(security cms -D -i "$tmp" | plutil -extract UUID raw -)
          cp "$tmp" "$PROFILE_DIR/$uuid.provisionprofile"
          echo "Installed $name profile UUID=$uuid"
        done

    - name: Run build package script
      run: ./build_pique.zsh "CREATE_PKG" "$NOTARY_APP_PASSWORD"

    - name: get environment variables
      id: get_env_var
      run: |
         echo "PIQUE_VERSION=$(/bin/cat ./build_info.txt)" >> $GITHUB_ENV
         echo "PIQUE_MAIN_VERSION=$(/bin/cat ./build_info_main.txt)" >> $GITHUB_ENV

    - name: Generate changelog
      id: changelog
      uses: metcalfc/changelog-generator@v4
      with:
        myToken: ${{ secrets.GITHUB_TOKEN }}
        reverse: 'true'

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        name: Pique ${{env.PIQUE_VERSION}}
        tag_name: v${{env.PIQUE_VERSION}}
        draft: true
        prerelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
            # Notes
            This is a version of Pique created by GitHub Actions.
            Pique.app has been signed and notarized. The package has been signed, notarized and stapled.

            # Changelog
            ${{ steps.changelog.outputs.changelog }}
        files: ${{github.workspace}}/outputs/*.pkg

    - name: Upload packages
      uses: actions/upload-artifact@v7
      with:
        name: packages
        path: outputs/
